<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>声音雕塑 · 数据肖像</title>
  <style>
    body {
      margin: 0; overflow: hidden; background: #000;
      font-family: 'Courier New', monospace;
    }
    #videoCanvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 1;
    }
    #threeCanvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 2; pointer-events: none;
    }
    #status {
      position: absolute; bottom: 30px; width: 100%; text-align: center;
      color: rgba(255,255,255,0.8); font-size: 12px; letter-spacing: 2px;
      z-index: 3; pointer-events: none; text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    #hint {
      position: absolute; top: 40px; width: 100%; text-align: center;
      color: rgba(255,255,255,0.9); font-size: 13px; letter-spacing: 3px;
      z-index: 3; pointer-events: none; text-shadow: 0 0 10px rgba(0,0,0,0.8);
      animation: subtlePulse 4s infinite;
    }
    @keyframes subtlePulse {
      0%, 100% { opacity: 0.5; } 50% { opacity: 1; }
    }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: white; font-size: 14px; letter-spacing: 2px;
      z-index: 100; text-align: center; line-height: 2;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    #startBtn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, 30px);
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.5);
      color: white; padding: 12px 30px; font-size: 14px; letter-spacing: 3px;
      border-radius: 50px; cursor: pointer; z-index: 200;
      font-family: 'Courier New', monospace; backdrop-filter: blur(10px);
    }
    #startBtn:hover { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <canvas id="videoCanvas"></canvas>
  <canvas id="threeCanvas"></canvas>
  <div id="loading">
    <div id="loadingText">◈ 声音雕塑已就绪 ◈</div>
    <div id="errorText" style="color:#ff8888;font-size:12px;display:none;"></div>
  </div>
  <button id="startBtn">◈ 开始体验 ◈</button>
  <div id="hint" style="opacity:0;">说出祝福，雕塑生长</div>
  <div id="status">用声音雕刻此刻</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.157.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ==================== 改这里 ====================
    const BIRTHDAY = { year: 2004, month: 5, day: 12 }; // 月：0=1月
    const FRIEND_NAME = "黄普远";
    // =============================================

    // DOM 元素
    const videoCanvas = document.getElementById('videoCanvas');
    const videoCtx = videoCanvas.getContext('2d');
    const threeCanvas = document.getElementById('threeCanvas');
    const startBtn = document.getElementById('startBtn');
    const loadingDiv = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const errorText = document.getElementById('errorText');
    const hintEl = document.getElementById('hint');
    const statusEl = document.getElementById('status');

    // 全局变量
    let scene, camera, renderer;
    let sculptureMesh;
    let audioContext, analyser, microphone, audioDataArray;
    let video;
    let faceDetected = false;
    let facePosition = { x: 0.5, y: 0.5, faceWidth: 0.3 };
    let currentScale = 0.0;
    let targetScale = 0.0;
    let animationId;

    // 基于生日的随机种子
    function seededRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
      };
    }
    const birthSeed = BIRTHDAY.year * 10000 + BIRTHDAY.month * 100 + BIRTHDAY.day;
    const rand = seededRandom(birthSeed);
    const params = {
      radius: 0.25 + rand() * 0.3,
      height: 0.4 + rand() * 0.5,
      twist: rand() * Math.PI * 2,
      symmetry: rand() > 0.5 ? 6 : 8,
      colorHue: rand(),
      wireframeDensity: 20 + Math.floor(rand() * 20),
    };

    // ============ Three.js 初始化 ============
    function initThreeJS() {
      scene = new THREE.Scene();
      
      // 透明背景
      scene.background = null;
      
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 10);
      camera.position.set(0, 0, 0.5);
      
      renderer = new THREE.WebGLRenderer({ 
        canvas: threeCanvas,
        antialias: true, 
        alpha: true 
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.setClearColor(0x000000, 0); // 完全透明背景

      // 灯光
      scene.add(new THREE.AmbientLight(0x111133, 0.5));
      const l1 = new THREE.PointLight(0x00ffff, 5, 2); l1.position.set(0.5, 0.5, 1); scene.add(l1);
      const l2 = new THREE.PointLight(0xff0066, 5, 2); l2.position.set(-0.5, -0.2, 0.8); scene.add(l2);
      const l3 = new THREE.PointLight(0xffffff, 3, 3); l3.position.set(0, 1, 0.5); scene.add(l3);

      createSculpture();
    }

    function createSculpture() {
      if (sculptureMesh) {
        scene.remove(sculptureMesh);
        sculptureMesh.children.forEach(c => { c.geometry?.dispose(); c.material?.dispose(); });
      }
      const geo = new THREE.BufferGeometry();
      const vertices = [], indices = [], colors = [];
      const layers = 30, pts = params.wireframeDensity;
      
      for (let i = 0; i <= layers; i++) {
        const t = i / layers, y = (t - 0.5) * params.height;
        const rLayer = params.radius * (1 + 0.3 * Math.sin(t * Math.PI * 3 + params.twist));
        for (let j = 0; j < pts; j++) {
          const angle = (j / pts) * Math.PI * 2;
          const sym = angle * params.symmetry / 2;
          const rMod = 1 + 0.15 * Math.sin(sym * 3 + t * params.twist * 2) + 0.08 * Math.cos(sym * 5 - t * 4);
          const r = rLayer * rMod;
          vertices.push(Math.cos(angle) * r, y, Math.sin(angle) * r);
          const hue = (params.colorHue + t * 0.3 + angle / (Math.PI * 2) * 0.2) % 1;
          const c = new THREE.Color(); c.setHSL(hue, 0.9, 0.5 + t * 0.3);
          colors.push(c.r, c.g, c.b);
        }
      }
      for (let i = 0; i < layers; i++) {
        for (let j = 0; j < pts; j++) {
          const cur = i * pts + j, nxt = cur + 1 - (j === pts - 1 ? pts : 0);
          const abv = (i + 1) * pts + j, abvNxt = (i + 1) * pts + (j + 1) % pts;
          indices.push(cur, abv, nxt, nxt, abv, abvNxt);
        }
      }
      geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      geo.setIndex(indices);
      geo.computeVertexNormals();
      
      const mat = new THREE.MeshPhysicalMaterial({
        metalness: 0.1, roughness: 0.2, transparent: true, opacity: 0.8,
        vertexColors: true, emissive: new THREE.Color(0x000000), emissiveIntensity: 0.2,
        clearcoat: 0.2, clearcoatRoughness: 0.4,
      });
      const wireMat = new THREE.MeshBasicMaterial({ 
        color: 0xffffff, wireframe: true, transparent: true, opacity: 0.2 
      });
      
      sculptureMesh = new THREE.Group();
      sculptureMesh.add(new THREE.Mesh(geo, mat));
      sculptureMesh.add(new THREE.Mesh(geo.clone(), wireMat));
      sculptureMesh.visible = false;
      sculptureMesh.scale.set(0.01, 0.01, 0.01);
      scene.add(sculptureMesh);
    }

    // ============ 音频 ============
    async function initAudio() {
      try {
        audioContext = new AudioContext();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        microphone = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 128;
        microphone.connect(analyser);
        audioDataArray = new Uint8Array(analyser.frequencyBinCount);
        statusEl.textContent = '◈ 正在倾听 ◈';
      } catch (e) {
        console.warn('麦克风不可用', e);
        statusEl.textContent = '◈ 静默模式 ◈';
      }
    }

    function getVolume() {
      if (!analyser || !audioDataArray) return 0.3;
      analyser.getByteFrequencyData(audioDataArray);
      let sum = 0;
      for (let i = 0; i < audioDataArray.length; i++) sum += audioDataArray[i];
      return sum / (audioDataArray.length * 255);
    }

    // ============ 简单的基于肤色的人脸检测（不依赖任何外部模型） ============
    function detectFace(imageData) {
      // 这是一个简化的检测：扫描画面中央区域，找肤色像素聚集区
      // 实际项目中这不如ML方案准确，但胜在零依赖、永远能跑
      const { data, width, height } = imageData;
      const centerX = Math.floor(width / 2);
      const centerY = Math.floor(height / 2);
      
      let totalSkinX = 0, totalSkinY = 0, skinCount = 0;
      let minX = width, maxX = 0, minY = height, maxY = 0;
      
      // 扫描中央60%的区域
      const startX = Math.floor(width * 0.2);
      const endX = Math.floor(width * 0.8);
      const startY = Math.floor(height * 0.1);
      const endY = Math.floor(height * 0.8);
      
      for (let y = startY; y < endY; y += 4) {
        for (let x = startX; x < endX; x += 4) {
          const idx = (y * width + x) * 4;
          const r = data[idx];
          const g = data[idx + 1];
          const b = data[idx + 2];
          
          // 简单的肤色检测规则
          const isSkin = (r > 95 && g > 40 && b > 20 &&
                          r > g && r > b &&
                          Math.abs(r - g) > 15 &&
                          r - Math.min(g, b) > 15);
          
          if (isSkin) {
            totalSkinX += x;
            totalSkinY += y;
            skinCount++;
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      }
      
      if (skinCount > 200) {
        const avgX = totalSkinX / skinCount;
        const avgY = totalSkinY / skinCount;
        const faceWidth = Math.max(maxX - minX, 60) / width;
        return {
          x: avgX / width,
          y: avgY / height,
          faceWidth: faceWidth,
          detected: true
        };
      }
      
      return { x: 0.5, y: 0.5, faceWidth: 0.25, detected: false };
    }

    // ============ 摄像头初始化 ============
    async function initCamera() {
      return new Promise(async (resolve, reject) => {
        try {
          video = document.createElement('video');
          video.setAttribute('playsinline', '');
          video.setAttribute('autoplay', '');
          
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { 
              facingMode: 'user', 
              width: { ideal: 640 }, 
              height: { ideal: 480 } 
            }
          });
          
          video.srcObject = stream;
          
          video.onloadedmetadata = () => {
            videoCanvas.width = video.videoWidth;
            videoCanvas.height = video.videoHeight;
            video.play();
            resolve();
          };
          
          video.onerror = (e) => reject(e);
        } catch (e) {
          reject(e);
        }
      });
    }

    // ============ 主循环 ============
    function drawVideoFrame() {
      if (!video || video.readyState < 2) return;
      
      // 绘制摄像头画面到 Canvas
      videoCtx.save();
      // 镜像翻转（因为前置摄像头）
      videoCtx.translate(videoCanvas.width, 0);
      videoCtx.scale(-1, 1);
      videoCtx.drawImage(video, 0, 0, videoCanvas.width, videoCanvas.height);
      videoCtx.restore();
      
      // 获取像素数据进行肤色检测
      const imageData = videoCtx.getImageData(0, 0, videoCanvas.width, videoCanvas.height);
      const face = detectFace(imageData);
      
      if (face.detected) {
        faceDetected = true;
        facePosition.x = face.x;
        facePosition.y = face.y;
        facePosition.faceWidth = face.faceWidth;
        statusEl.textContent = '◈ 已感知你的存在 ◈';
      } else {
        // 如果没检测到，保持上一个位置，但逐渐移到中央
        facePosition.x += (0.5 - facePosition.x) * 0.05;
        facePosition.y += (0.5 - facePosition.y) * 0.05;
        if (!faceDetected) {
          statusEl.textContent = '◈ 寻找你的面容 ◈';
        }
      }
    }

    function animateSculpture(volume) {
      if (!sculptureMesh?.children[0]) return;
      const mesh = sculptureMesh.children[0];
      const pos = mesh.geometry.attributes.position;
      if (!mesh.geometry.userData.orig) {
        mesh.geometry.userData.orig = new Float32Array(pos.array);
      }
      const orig = mesh.geometry.userData.orig;
      const arr = pos.array;
      const str = volume * 0.02;
      
      for (let i = 0; i < arr.length; i += 3) {
        if (Math.random() < volume * 0.25) {
          const nx = orig[i] * 1.5, ny = orig[i+1] * 1.5, nz = orig[i+2] * 1.5;
          const noise = Math.sin(nx*8+performance.now()*0.001) * 
                        Math.cos(ny*8+performance.now()*0.0013) * 
                        Math.sin(nz*8+performance.now()*0.0017);
          arr[i] = orig[i] + nx * noise * str;
          arr[i+1] = orig[i+1] + ny * noise * str;
          arr[i+2] = orig[i+2] + nz * noise * str;
        } else {
          arr[i] += (orig[i] - arr[i]) * 0.08;
          arr[i+1] += (orig[i+1] - arr[i+1]) * 0.08;
          arr[i+2] += (orig[i+2] - arr[i+2]) * 0.08;
        }
      }
      pos.needsUpdate = true;
      mesh.geometry.computeVertexNormals();
    }

    function animate() {
      animationId = requestAnimationFrame(animate);
      
      drawVideoFrame();
      
      const vol = getVolume();
      targetScale = faceDetected ? 1 : Math.max(0.3, targetScale);
      const ds = targetScale * (1 + vol * 1.5);
      currentScale += (ds - currentScale) * 0.08;
      
      if (sculptureMesh && currentScale > 0.1) {
        sculptureMesh.visible = true;
        
        // 将归一化坐标映射到3D空间
        const x3d = (facePosition.x - 0.5) * 1.5;
        const y3d = -(facePosition.y - 0.5) * 2.0;
        const z3d = -0.2;
        const s3d = Math.max(facePosition.faceWidth * 2.5, 0.4);
        
        sculptureMesh.position.set(x3d, y3d, z3d);
        sculptureMesh.scale.setScalar(currentScale * s3d);
        
        animateSculpture(vol);
        
        // 更新材质
        sculptureMesh.children.forEach(c => {
          if (c.material?.opacity !== undefined && !c.material.wireframe) {
            c.material.opacity = 0.5 + vol * 0.5;
          }
          if (c.material?.emissive) {
            c.material.emissive.setHSL(
              (params.colorHue + vol * 0.2) % 1, 
              0.9, 
              vol * 0.5
            );
          }
        });
        
        if (vol > 0.15) {
          statusEl.textContent = '◈ 雕塑正在共鸣 ◈';
        }
      } else if (sculptureMesh) {
        sculptureMesh.visible = false;
        statusEl.textContent = '◈ 等待你的出现 ◈';
      }
      
      renderer.render(scene, camera);
    }

    // ============ 窗口调整 ============
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      videoCanvas.width = window.innerWidth;
      videoCanvas.height = window.innerHeight;
    });

    // ============ 启动逻辑 ============
    function showError(msg) {
      loadingText.textContent = '⚠️ 启动失败';
      errorText.style.display = 'block';
      errorText.textContent = msg;
      startBtn.style.display = 'block';
      startBtn.textContent = '◈ 重试 ◈';
    }

    startBtn.style.display = 'block';
    loadingDiv.style.top = '45%';

    startBtn.addEventListener('click', async () => {
      startBtn.style.display = 'none';
      loadingText.textContent = '◈ 正在初始化... ◈';
      
      try {
        // 初始化摄像头
        loadingText.textContent = '◈ 请求摄像头... ◈';
        await initCamera();
        
        // 初始化音频
        loadingText.textContent = '◈ 请求麦克风... ◈';
        await initAudio();
        
        // 初始化3D场景
        loadingText.textContent = '◈ 创建雕塑... ◈';
        initThreeJS();
        
        // 隐藏加载界面
        loadingDiv.style.opacity = '0';
        setTimeout(() => loadingDiv.remove(), 800);
        
        hintEl.style.opacity = '1';
        statusEl.textContent = '◈ 将脸对准屏幕 ◈';
        
        // 开始动画循环
        animate();
        
      } catch (err) {
        console.error('启动错误:', err);
        showError('摄像头或麦克风权限被拒绝，请在浏览器设置中允许后刷新页面');
      }
    });
  </script>
</body>
</html>
