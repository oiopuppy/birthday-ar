<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>声音雕塑 · 数据肖像</title>
  <style>
    body {
      margin: 0; overflow: hidden; background: #000;
      font-family: 'Courier New', monospace;
    }
    #status {
      position: absolute; bottom: 30px; width: 100%; text-align: center;
      color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 2px;
      z-index: 10; pointer-events: none; transition: opacity 0.8s;
    }
    #hint {
      position: absolute; top: 40px; width: 100%; text-align: center;
      color: rgba(255,255,255,0.7); font-size: 13px; letter-spacing: 3px;
      z-index: 10; pointer-events: none; animation: subtlePulse 4s infinite;
    }
    @keyframes subtlePulse {
      0%, 100% { opacity: 0.4; } 50% { opacity: 1; }
    }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.9); font-size: 14px; letter-spacing: 2px;
      z-index: 100; text-align: center; line-height: 2;
    }
    #startBtn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, 20px);
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.4);
      color: white; padding: 12px 30px; font-size: 14px; letter-spacing: 3px;
      border-radius: 50px; cursor: pointer; z-index: 200;
      font-family: 'Courier New', monospace; backdrop-filter: blur(10px);
      display: none;
    }
    #startBtn:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loadingText">◈ 声音雕塑已就绪 ◈</div>
    <div id="errorText" style="color:#ff6666;font-size:12px;display:none;"></div>
  </div>
  <button id="startBtn">◈ 开始体验 ◈</button>
  <div id="hint" style="opacity:0;">说出祝福，雕塑生长</div>
  <div id="status">用声音雕刻此刻</div>

  <!-- clmtrackr 库 -->
  <script src="https://cdn.jsdelivr.net/npm/clmtrackr@1.1.2/build/clmtrackr.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.157.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ==================== 改这里 ====================
    const BIRTHDAY = { year: 2004, month: 5, day: 12 }; // 月：0=1月
    const FRIEND_NAME = "黄普远";
    // =============================================

    // 全局变量
    let scene, camera, renderer;
    let sculptureMesh;
    let audioContext, analyser, microphone, audioDataArray;
    let facePosition = { x: 0.5, y: 0.5, scale: 0 };
    let faceDetected = false;
    let faceStableFrames = 0;
    const FACE_STABLE_THRESHOLD = 30;
    let currentScale = 0.0;
    let targetScale = 0.0;
    let clmtracker;
    let video;

    // 基于生日的随机种子
    function seededRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
      };
    }
    const birthSeed = BIRTHDAY.year * 10000 + BIRTHDAY.month * 100 + BIRTHDAY.day;
    const rand = seededRandom(birthSeed);
    const params = {
      radius: 0.25 + rand() * 0.3,
      height: 0.4 + rand() * 0.5,
      twist: rand() * Math.PI * 2,
      symmetry: rand() > 0.5 ? 6 : 8,
      colorHue: rand(),
      wireframeDensity: 20 + Math.floor(rand() * 20),
    };

    // Three.js 场景
    function initThreeJS() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 10);
      camera.position.set(0, 0, 0.5);
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.body.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0x111133, 0.5));
      const l1 = new THREE.PointLight(0x00ffff, 5, 2); l1.position.set(0.5, 0.5, 1); scene.add(l1);
      const l2 = new THREE.PointLight(0xff0066, 5, 2); l2.position.set(-0.5, -0.2, 0.8); scene.add(l2);
      const l3 = new THREE.PointLight(0xffffff, 3, 3); l3.position.set(0, 1, 0.5); scene.add(l3);

      createSculpture();
      createStarfield();
    }

    function createSculpture() {
      if (sculptureMesh) {
        scene.remove(sculptureMesh);
        sculptureMesh.children.forEach(c => { c.geometry?.dispose(); c.material?.dispose(); });
      }
      const geo = new THREE.BufferGeometry();
      const vertices = [], indices = [], colors = [];
      const layers = 30, pts = params.wireframeDensity;
      for (let i = 0; i <= layers; i++) {
        const t = i / layers, y = (t - 0.5) * params.height;
        const rLayer = params.radius * (1 + 0.3 * Math.sin(t * Math.PI * 3 + params.twist));
        for (let j = 0; j < pts; j++) {
          const angle = (j / pts) * Math.PI * 2;
          const sym = angle * params.symmetry / 2;
          const rMod = 1 + 0.15 * Math.sin(sym * 3 + t * params.twist * 2) + 0.08 * Math.cos(sym * 5 - t * 4);
          const r = rLayer * rMod;
          vertices.push(Math.cos(angle) * r, y, Math.sin(angle) * r);
          const hue = (params.colorHue + t * 0.3 + angle / (Math.PI * 2) * 0.2) % 1;
          const c = new THREE.Color(); c.setHSL(hue, 0.9, 0.5 + t * 0.3);
          colors.push(c.r, c.g, c.b);
        }
      }
      for (let i = 0; i < layers; i++) {
        for (let j = 0; j < pts; j++) {
          const cur = i * pts + j, nxt = cur + 1 - (j === pts - 1 ? pts : 0);
          const abv = (i + 1) * pts + j, abvNxt = (i + 1) * pts + (j + 1) % pts;
          indices.push(cur, abv, nxt, nxt, abv, abvNxt);
        }
      }
      geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      geo.setIndex(indices);
      geo.computeVertexNormals();
      const mat = new THREE.MeshPhysicalMaterial({
        metalness: 0.1, roughness: 0.2, transparent: true, opacity: 0.75,
        vertexColors: true, emissive: new THREE.Color(0x000000), emissiveIntensity: 0.1,
        clearcoat: 0.2, clearcoatRoughness: 0.4,
      });
      const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.15 });
      sculptureMesh = new THREE.Group();
      sculptureMesh.add(new THREE.Mesh(geo, mat));
      sculptureMesh.add(new THREE.Mesh(geo.clone(), wireMat));
      sculptureMesh.visible = false;
      sculptureMesh.scale.set(0.01, 0.01, 0.01);
      scene.add(sculptureMesh);
    }

    function createStarfield() {
      const g = new THREE.BufferGeometry(), v = [];
      for (let i = 0; i < 500; i++) v.push((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3, -0.5 - Math.random() * 2);
      g.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
      scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0xffffff, size: 0.002, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending })));
    }

    async function initAudio() {
      try {
        audioContext = new AudioContext();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        microphone = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 128;
        microphone.connect(analyser);
        audioDataArray = new Uint8Array(analyser.frequencyBinCount);
        console.log('🎤 麦克风就绪');
      } catch (e) { console.warn('麦克风不可用', e); }
    }

    function getVolume() {
      if (!analyser || !audioDataArray) return 0.5;
      analyser.getByteFrequencyData(audioDataArray);
      let sum = 0;
      for (let i = 0; i < audioDataArray.length; i++) sum += audioDataArray[i];
      return sum / (audioDataArray.length * 255);
    }

    // ============ 使用 clmtrackr 替代 MediaPipe ============
    async function initFaceTracker() {
      return new Promise((resolve, reject) => {
        try {
          video = document.createElement('video');
          video.setAttribute('playsinline', '');
          video.setAttribute('autoplay', '');
          video.style.display = 'none';
          document.body.appendChild(video);

          navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
          }).then(stream => {
            video.srcObject = stream;
            video.play().then(() => {
              clmtracker = new window.clm.tracker({ useWebGL: true, maxIterationsPerAnimFrame: 1 });
              clmtracker.init();
              clmtracker.start(video);
              
              // 监听追踪结果
              function trackLoop() {
                const positions = clmtracker.getCurrentPosition();
                if (positions && positions.length > 0) {
                  // 计算人脸中心（取鼻梁点索引33-38的平均值）
                  let cx = 0, cy = 0, count = 0;
                  for (let i = 33; i <= 38; i++) {
                    if (positions[i]) {
                      cx += positions[i][0];
                      cy += positions[i][1];
                      count++;
                    }
                  }
                  if (count > 0) {
                    facePosition.x = cx / count / video.videoWidth;
                    facePosition.y = cy / count / video.videoHeight;
                    
                    // 估算人脸大小（用下颌宽度）
                    if (positions[7] && positions[13]) {
                      const dx = positions[7][0] - positions[13][0];
                      const dy = positions[7][1] - positions[13][1];
                      facePosition.scale = Math.sqrt(dx*dx + dy*dy) / video.videoWidth;
                    } else {
                      facePosition.scale = 0.3;
                    }
                    faceDetected = true;
                    faceStableFrames++;
                  }
                } else {
                  faceStableFrames = Math.max(0, faceStableFrames - 2);
                  if (faceStableFrames <= 0) faceDetected = false;
                }
                requestAnimationFrame(trackLoop);
              }
              trackLoop();
              console.log('👁️ 面部追踪已启动 (clmtrackr)');
              resolve();
            }).catch(reject);
          }).catch(reject);
        } catch(e) { reject(e); }
      });
    }

    function getFaceTransform() {
      if (!faceDetected || faceStableFrames < FACE_STABLE_THRESHOLD) {
        return { pos: new THREE.Vector3(0, 0, 0), scale: 0, confidence: 0 };
      }
      // 将归一化坐标映射到3D空间
      const x = (facePosition.x - 0.5) * 1.2;
      const y = -(facePosition.y - 0.5) * 1.5;
      const z = -0.1;
      const s = Math.max(facePosition.scale * 3, 0.2);
      return {
        pos: new THREE.Vector3(x, y, z),
        scale: s,
        confidence: faceStableFrames / FACE_STABLE_THRESHOLD
      };
    }

    function animateSculpture(volume) {
      if (!sculptureMesh?.children[0]) return;
      const mesh = sculptureMesh.children[0];
      const pos = mesh.geometry.attributes.position;
      if (!mesh.geometry.userData.orig) mesh.geometry.userData.orig = new Float32Array(pos.array);
      const orig = mesh.geometry.userData.orig;
      const arr = pos.array;
      const str = volume * 0.015;
      for (let i = 0; i < arr.length; i += 3) {
        if (Math.random() < volume * 0.3) {
          const nx = orig[i]*2, ny = orig[i+1]*2, nz = orig[i+2]*2;
          const noise = Math.sin(nx*10+performance.now()*0.001)*Math.cos(ny*10+performance.now()*0.0013)*Math.sin(nz*10+performance.now()*0.0017);
          arr[i] = orig[i] + nx * noise * str;
          arr[i+1] = orig[i+1] + ny * noise * str;
          arr[i+2] = orig[i+2] + nz * noise * str;
        } else {
          arr[i] += (orig[i] - arr[i]) * 0.1;
          arr[i+1] += (orig[i+1] - arr[i+1]) * 0.1;
          arr[i+2] += (orig[i+2] - arr[i+2]) * 0.1;
        }
      }
      pos.needsUpdate = true;
      mesh.geometry.computeVertexNormals();
    }

    function animate() {
      requestAnimationFrame(animate);
      const ft = getFaceTransform();
      const vol = getVolume();
      
      targetScale = ft.confidence >= 1 ? 1 : Math.max(0, ft.confidence);
      const ds = targetScale * (1 + vol * 1.5);
      currentScale += (ds - currentScale) * 0.08;

      if (sculptureMesh && currentScale > 0.02) {
        sculptureMesh.visible = true;
        sculptureMesh.position.copy(ft.pos);
        sculptureMesh.scale.setScalar(currentScale * ft.scale * 1.2);
        animateSculpture(vol);
        sculptureMesh.children.forEach(c => {
          if (c.material?.opacity !== undefined && !c.material.wireframe)
            c.material.opacity = 0.4 + vol * 0.6;
          if (c.material?.emissive)
            c.material.emissive.setHSL((params.colorHue + vol * 0.15) % 1, 0.8, vol * 0.4);
        });
        document.getElementById('status').textContent = vol > 0.1 ? '◈ 雕塑正在共鸣 ◈' : '◈ 静候你的声音 ◈';
      } else if (sculptureMesh) {
        sculptureMesh.visible = false;
      }
      scene.children.forEach(c => { if (c.isPoints) { c.rotation.y += 0.0002; c.rotation.x += 0.0001; } });
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ============ 启动逻辑 ============
    const startBtn = document.getElementById('startBtn');
    const loadingDiv = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const errorText = document.getElementById('errorText');

    function showError(msg) {
      loadingText.textContent = '⚠️ 启动失败';
      errorText.style.display = 'block';
      errorText.textContent = msg;
      startBtn.style.display = 'block';
      startBtn.textContent = '◈ 重试 ◈';
    }

    // 检查协议
    if (location.protocol === 'file:') {
      loadingText.textContent = '❌ 请使用 Live Server 或部署到 HTTPS';
      errorText.style.display = 'block';
      errorText.textContent = 'file:// 不支持摄像头';
    } else if (location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      loadingText.textContent = '❌ 需要 HTTPS';
      errorText.style.display = 'block';
      errorText.textContent = '已部署到 GitHub Pages? 请用 https:// 访问';
    } else {
      loadingText.textContent = '◈ 声音雕塑已就绪 ◈';
      startBtn.style.display = 'block';
      loadingDiv.style.top = '45%';

      startBtn.addEventListener('click', async () => {
        startBtn.style.display = 'none';
        loadingText.textContent = '◈ 正在初始化... ◈';
        
        // 检查 clmtrackr 是否加载
        if (typeof window.clm === 'undefined') {
          showError('核心库加载失败，请检查网络后刷新');
          return;
        }

        try {
          initThreeJS();
          await initAudio();
          await initFaceTracker();
          loadingDiv.style.opacity = '0';
          setTimeout(() => loadingDiv.remove(), 800);
          document.getElementById('hint').style.opacity = '1';
          animate();
        } catch (err) {
          console.error(err);
          showError('请确保已允许摄像头和麦克风权限，然后刷新页面重试');
        }
      });
    }
  </script>
</body>
</html>
