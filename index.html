<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>声音雕塑 · 数据肖像</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:#000;
  font-family:"Microsoft YaHei",sans-serif;
}

#videoCanvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

#threeCanvas{
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
}

#overlay{
  position:fixed;
  inset:0;
  z-index:10;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(10px);
  transition:0.6s;
}

#title{
  color:white;
  font-size:18px;
  letter-spacing:6px;
  margin-bottom:20px;
  opacity:0.9;
}

#desc{
  color:rgba(255,255,255,0.6);
  font-size:12px;
  letter-spacing:3px;
  margin-bottom:40px;
}

#startBtn{
  border:none;
  outline:none;
  cursor:pointer;
  padding:14px 34px;
  border-radius:999px;
  background:rgba(255,255,255,0.08);
  color:white;
  letter-spacing:4px;
  font-size:13px;
  border:1px solid rgba(255,255,255,0.3);
  transition:0.3s;
}

#startBtn:hover{
  background:rgba(255,255,255,0.15);
  transform:scale(1.05);
}

#status{
  position:fixed;
  bottom:28px;
  width:100%;
  text-align:center;
  color:rgba(255,255,255,0.75);
  font-size:12px;
  letter-spacing:3px;
  z-index:20;
  text-shadow:0 0 12px rgba(0,0,0,0.8);
}

#error{
  margin-top:20px;
  color:#ff8d8d;
  font-size:12px;
  letter-spacing:2px;
  max-width:80%;
  text-align:center;
}

#hint{
  position:fixed;
  top:40px;
  width:100%;
  text-align:center;
  color:rgba(255,255,255,0.7);
  font-size:12px;
  letter-spacing:4px;
  z-index:20;
  animation:pulse 3s infinite;
}

@keyframes pulse{
  0%{opacity:0.4;}
  50%{opacity:1;}
  100%{opacity:0.4;}
}
</style>
</head>

<body>

<canvas id="videoCanvas"></canvas>
<canvas id="threeCanvas"></canvas>

<div id="overlay">
  <div id="title">◈ 声音雕塑 ◈</div>
  <div id="desc">你的声音将塑造此刻</div>
  <button id="startBtn">开始体验</button>
  <div id="error"></div>
</div>

<div id="hint">请将脸对准屏幕中央</div>
<div id="status">等待启动</div>

<script type="importmap">
{
  "imports":{
    "three":"https://unpkg.com/three@0.157.0/build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from 'three';

const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');
const errorEl = document.getElementById('error');
const startBtn = document.getElementById('startBtn');

const videoCanvas = document.getElementById('videoCanvas');
const videoCtx = videoCanvas.getContext('2d');

const threeCanvas = document.getElementById('threeCanvas');

let scene;
let camera;
let renderer;
let sculpture;

let analyser;
let audioArray;

let video;

let faceX = 0;
let faceY = 0;
let faceSize = 1;

let detected = false;

const seed = 20040512;

function seededRandom(seed){
  let s = seed;
  return function(){
    s = (s * 16807) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

const rand = seededRandom(seed);

const params = {
  radius:0.22 + rand() * 0.2,
  height:0.6 + rand() * 0.3,
  twist:rand() * Math.PI * 2,
  density:40,
  hue:rand()
};

function initThree(){

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.01,
    100
  );

  camera.position.z = 1.4;

  renderer = new THREE.WebGLRenderer({
    canvas:threeCanvas,
    antialias:true,
    alpha:true
  });

  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );

  renderer.setClearColor(0x000000,0);

  const ambient = new THREE.AmbientLight(0xffffff,0.7);
  scene.add(ambient);

  const light1 = new THREE.PointLight(0x00ffff,3);
  light1.position.set(2,2,2);

  const light2 = new THREE.PointLight(0xff00aa,3);
  light2.position.set(-2,-2,2);

  scene.add(light1);
  scene.add(light2);

  createSculpture();
}

function createSculpture(){

  const geometry = new THREE.IcosahedronGeometry(
    0.22,
    30
  );

  const positions = geometry.attributes.position;

  const original = new Float32Array(
    positions.array
  );

  geometry.userData.original = original;

  const material = new THREE.MeshPhysicalMaterial({
    metalness:0.15,
    roughness:0.25,
    transmission:0.2,
    thickness:0.5,
    transparent:true,
    opacity:0.9,
    color:new THREE.Color().setHSL(
      params.hue,
      0.9,
      0.6
    ),
    emissive:new THREE.Color().setHSL(
      params.hue,
      1,
      0.1
    )
  });

  const wire = new THREE.MeshBasicMaterial({
    color:0xffffff,
    wireframe:true,
    transparent:true,
    opacity:0.12
  });

  sculpture = new THREE.Group();

  sculpture.add(
    new THREE.Mesh(geometry,material)
  );

  sculpture.add(
    new THREE.Mesh(geometry.clone(),wire)
  );

  scene.add(sculpture);
}

async function initCamera(){

  return new Promise(async(resolve,reject)=>{

    try{

      video = document.createElement('video');

      video.autoplay = true;
      video.muted = true;
      video.playsInline = true;

      video.style.position = 'fixed';
      video.style.opacity = '0';
      video.style.pointerEvents = 'none';
      video.style.zIndex = '-999';

      document.body.appendChild(video);

      const stream =
        await navigator.mediaDevices.getUserMedia({
          video:{
            width:{ideal:640},
            height:{ideal:480}
          },
          audio:false
        });

      video.srcObject = stream;

      video.onloadedmetadata = async()=>{

        try{

          await video.play();

          videoCanvas.width =
            video.videoWidth || 640;

          videoCanvas.height =
            video.videoHeight || 480;

          resolve();

        }catch(err){

          reject(err);
        }
      };

      video.onerror = reject;

    }catch(err){

      reject(err);
    }
  });
}

async function initAudio(){

  try{

    const stream =
      await navigator.mediaDevices.getUserMedia({
        audio:true
      });

    const audioContext =
      new AudioContext();

    const source =
      audioContext.createMediaStreamSource(stream);

    analyser =
      audioContext.createAnalyser();

    analyser.fftSize = 128;

    source.connect(analyser);

    audioArray =
      new Uint8Array(
        analyser.frequencyBinCount
      );

    statusEl.textContent = '麦克风已连接';

  }catch(e){

    console.warn(e);

    statusEl.textContent =
      '麦克风不可用 · 已进入静默模式';
  }
}

function getVolume(){

  if(!analyser) return 0.15;

  analyser.getByteFrequencyData(audioArray);

  let sum = 0;

  for(let i=0;i<audioArray.length;i++){
    sum += audioArray[i];
  }

  return sum / (audioArray.length * 255);
}

function detectFace(){

  if(!video || video.readyState < 2) return;

  videoCtx.save();

  videoCtx.translate(videoCanvas.width,0);
  videoCtx.scale(-1,1);

  videoCtx.drawImage(
    video,
    0,
    0,
    videoCanvas.width,
    videoCanvas.height
  );

  videoCtx.restore();

  const img =
    videoCtx.getImageData(
      0,
      0,
      videoCanvas.width,
      videoCanvas.height
    );

  const data = img.data;

  let totalX = 0;
  let totalY = 0;
  let count = 0;

  let minX = 999999;
  let maxX = 0;

  for(let y=0;y<videoCanvas.height;y+=5){

    for(let x=0;x<videoCanvas.width;x+=5){

      const i =
        (y * videoCanvas.width + x) * 4;

      const r = data[i];
      const g = data[i+1];
      const b = data[i+2];

      const isSkin =
        r > 90 &&
        g > 40 &&
        b > 20 &&
        r > g &&
        r > b &&
        Math.abs(r-g) > 15;

      if(isSkin){

        totalX += x;
        totalY += y;

        count++;

        if(x < minX) minX = x;
        if(x > maxX) maxX = x;
      }
    }
  }

  if(count > 150){

    detected = true;

    faceX = totalX / count / videoCanvas.width;
    faceY = totalY / count / videoCanvas.height;

    faceSize =
      Math.max((maxX - minX) / videoCanvas.width,0.25);

    statusEl.textContent =
      '已检测到你的存在';

  }else{

    detected = false;

    statusEl.textContent =
      '请将脸移动到光线处';
  }
}

function animateSculpture(volume){

  const mesh = sculpture.children[0];

  const geo = mesh.geometry;

  const pos = geo.attributes.position;

  const arr = pos.array;

  const orig = geo.userData.original;

  const time = performance.now() * 0.001;

  for(let i=0;i<arr.length;i+=3){

    const ox = orig[i];
    const oy = orig[i+1];
    const oz = orig[i+2];

    const noise =
      Math.sin(ox*8 + time*2) *
      Math.cos(oy*8 + time*1.3) *
      Math.sin(oz*8 + time*1.7);

    const amp = 1 + volume * 1.8;

    arr[i] =
      ox + ox * noise * 0.15 * amp;

    arr[i+1] =
      oy + oy * noise * 0.15 * amp;

    arr[i+2] =
      oz + oz * noise * 0.15 * amp;
  }

  pos.needsUpdate = true;

  geo.computeVertexNormals();

  sculpture.rotation.y += 0.005;
  sculpture.rotation.x += 0.003;
}

function animate(){

  requestAnimationFrame(animate);

  detectFace();

  const volume = getVolume();

  if(detected){

    const x =
      (faceX - 0.5) * 1.4;

    const y =
      -(faceY - 0.5) * 1.8;

    sculpture.position.x +=
      (x - sculpture.position.x) * 0.08;

    sculpture.position.y +=
      (y - sculpture.position.y) * 0.08;

    const scale =
      0.8 + faceSize + volume * 1.5;

    sculpture.scale.setScalar(scale);

    animateSculpture(volume);

  }

  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{

  camera.aspect =
    window.innerWidth / window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );
});

startBtn.addEventListener('click',async()=>{

  errorEl.innerHTML = '';

  try{

    startBtn.disabled = true;

    statusEl.textContent =
      '正在初始化摄像头';

    await initCamera();

    statusEl.textContent =
      '正在初始化麦克风';

    await initAudio();

    statusEl.textContent =
      '正在创建雕塑';

    initThree();

    overlay.style.opacity = '0';

    setTimeout(()=>{
      overlay.style.display = 'none';
    },700);

    animate();

    statusEl.textContent =
      '说句话试试';

  }catch(e){

    console.error(e);

    errorEl.innerHTML =
      '请允许摄像头与麦克风权限，并确保使用 HTTPS 打开页面';

    startBtn.disabled = false;

    statusEl.textContent =
      '启动失败';
  }
});

</script>
</body>
</html>
