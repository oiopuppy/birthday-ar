<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
/>

<title>声音雕塑 · 数据肖像</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
}

body{
  position:relative;
}

#bg{
  position:fixed;
  inset:0;
  z-index:0;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.06), transparent 60%),
    #000;
}

#video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scaleX(-1);
  z-index:1;
  opacity:0.28;
  filter:
    brightness(0.9)
    contrast(1.1)
    saturate(0.7);
}

#threeCanvas{
  position:fixed;
  inset:0;
  z-index:3;
  pointer-events:none;
}

#noise{
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
  opacity:0.04;
  background-image:
    radial-gradient(#fff 0.7px, transparent 0.7px);
  background-size:4px 4px;
}

#overlay{
  position:fixed;
  inset:0;
  z-index:10;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(0,0,0,0.72);
  backdrop-filter:blur(12px);
  transition:0.8s ease;
}

#title{
  color:#fff;
  font-size:20px;
  letter-spacing:8px;
  margin-bottom:22px;
  text-shadow:0 0 30px rgba(255,255,255,0.25);
}

#sub{
  color:rgba(255,255,255,0.55);
  font-size:12px;
  letter-spacing:3px;
  margin-bottom:42px;
}

#startBtn{
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
  color:#fff;
  padding:16px 42px;
  border-radius:999px;
  cursor:pointer;
  letter-spacing:4px;
  font-size:13px;
  transition:0.35s;
}

#startBtn:hover{
  transform:scale(1.06);
  background:rgba(255,255,255,0.14);
}

#status{
  position:fixed;
  bottom:28px;
  width:100%;
  text-align:center;
  color:rgba(255,255,255,0.72);
  font-size:12px;
  letter-spacing:3px;
  z-index:20;
  text-shadow:0 0 18px rgba(0,0,0,0.8);
}

#hint{
  position:fixed;
  top:36px;
  width:100%;
  text-align:center;
  color:rgba(255,255,255,0.65);
  font-size:12px;
  letter-spacing:4px;
  z-index:20;
  animation:pulse 3s infinite;
}

#error{
  margin-top:20px;
  color:#ff8e8e;
  font-size:12px;
  text-align:center;
  line-height:1.7;
  max-width:80%;
}

@keyframes pulse{
  0%{opacity:0.35;}
  50%{opacity:1;}
  100%{opacity:0.35;}
}

</style>
</head>

<body>

<div id="bg"></div>

<video
  id="video"
  autoplay
  muted
  playsinline
></video>

<div id="noise"></div>

<canvas id="threeCanvas"></canvas>

<div id="overlay">

  <div id="title">
    ◈ 声音雕塑 ◈
  </div>

  <div id="sub">
    你的声音将雕刻此刻
  </div>

  <button id="startBtn">
    开始体验
  </button>

  <div id="error"></div>

</div>

<div id="hint">
  请将脸移动到光线充足处
</div>

<div id="status">
  等待启动
</div>

<script type="importmap">
{
  "imports":{
    "three":"https://unpkg.com/three@0.157.0/build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from 'three';

const video = document.getElementById('video');
const canvas = document.getElementById('threeCanvas');

const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');
const errorEl = document.getElementById('error');
const startBtn = document.getElementById('startBtn');

let scene;
let camera;
let renderer;
let sculpture;

let analyser;
let audioArray;

let faceDetected = false;

let mouseX = 0;
let mouseY = 0;

const seed = 20040512;

function seededRandom(seed){

  let s = seed;

  return function(){

    s = (s * 16807) % 2147483647;

    return (s - 1) / 2147483646;
  };
}

const rand = seededRandom(seed);

const PARAMS = {

  hue:rand(),

  deform:0.25 + rand() * 0.2
};

function updateStatus(text){

  statusEl.textContent = text;
}

async function initCamera(){

  updateStatus('正在初始化摄像头');

  try{

    if(
      !navigator.mediaDevices ||
      !navigator.mediaDevices.getUserMedia
    ){
      throw new Error(
        '浏览器不支持摄像头'
      );
    }

    const stream =
      await navigator.mediaDevices.getUserMedia({

        video:{
          facingMode:'user',
          width:{ideal:1280},
          height:{ideal:720}
        },

        audio:false
      });

    video.srcObject = stream;

    await new Promise((resolve,reject)=>{

      video.onloadedmetadata = async()=>{

        try{

          await video.play();

          resolve();

        }catch(e){

          reject(e);
        }
      };

      video.onerror = reject;

      setTimeout(()=>{

        reject(
          new Error(
            '摄像头启动超时'
          )
        );

      },10000);

    });

    updateStatus('摄像头连接成功');

  }catch(err){

    console.error(err);

    throw err;
  }
}

async function initAudio(){

  updateStatus('正在初始化麦克风');

  try{

    const stream =
      await navigator.mediaDevices.getUserMedia({

        audio:true
      });

    const ctx = new AudioContext();

    analyser =
      ctx.createAnalyser();

    analyser.fftSize = 128;

    const source =
      ctx.createMediaStreamSource(stream);

    source.connect(analyser);

    audioArray =
      new Uint8Array(
        analyser.frequencyBinCount
      );

    updateStatus('麦克风连接成功');

  }catch(err){

    console.warn(err);

    updateStatus('麦克风不可用 · 已进入静默模式');
  }
}

function getVolume(){

  if(!analyser){

    return 0.08;
  }

  analyser.getByteFrequencyData(audioArray);

  let sum = 0;

  for(let i=0;i<audioArray.length;i++){

    sum += audioArray[i];
  }

  return sum / (audioArray.length * 255);
}

function initThree(){

  scene = new THREE.Scene();

  camera =
    new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.01,
      100
    );

  camera.position.z = 1.6;

  renderer =
    new THREE.WebGLRenderer({

      canvas,
      alpha:true,
      antialias:true
    });

  renderer.setPixelRatio(
    Math.min(window.devicePixelRatio,2)
  );

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );

  renderer.setClearColor(
    0x000000,
    0
  );

  const ambient =
    new THREE.AmbientLight(
      0xffffff,
      0.8
    );

  scene.add(ambient);

  const light1 =
    new THREE.PointLight(
      0x00ffff,
      3
    );

  light1.position.set(
    2,
    2,
    2
  );

  scene.add(light1);

  const light2 =
    new THREE.PointLight(
      0xff00aa,
      3
    );

  light2.position.set(
    -2,
    -2,
    2
  );

  scene.add(light2);

  createSculpture();
}

function createSculpture(){

  const geometry =
    new THREE.IcosahedronGeometry(
      0.25,
      45
    );

  const original =
    new Float32Array(
      geometry.attributes.position.array
    );

  geometry.userData.original = original;

  const material =
    new THREE.MeshPhysicalMaterial({

      color:new THREE.Color().setHSL(
        PARAMS.hue,
        0.85,
        0.62
      ),

      emissive:new THREE.Color().setHSL(
        PARAMS.hue,
        1,
        0.08
      ),

      metalness:0.15,
      roughness:0.2,

      transparent:true,
      opacity:0.95,

      clearcoat:1,
      clearcoatRoughness:0.2
    });

  const wire =
    new THREE.MeshBasicMaterial({

      color:0xffffff,
      wireframe:true,
      transparent:true,
      opacity:0.08
    });

  sculpture = new THREE.Group();

  sculpture.add(
    new THREE.Mesh(
      geometry,
      material
    )
  );

  sculpture.add(
    new THREE.Mesh(
      geometry.clone(),
      wire
    )
  );

  scene.add(sculpture);
}

function animateSculpture(volume){

  const mesh =
    sculpture.children[0];

  const geo =
    mesh.geometry;

  const pos =
    geo.attributes.position;

  const arr =
    pos.array;

  const orig =
    geo.userData.original;

  const t =
    performance.now() * 0.001;

  for(let i=0;i<arr.length;i+=3){

    const ox = orig[i];
    const oy = orig[i+1];
    const oz = orig[i+2];

    const noise =

      Math.sin(ox * 8 + t * 2.2) *

      Math.cos(oy * 8 + t * 1.7) *

      Math.sin(oz * 8 + t * 2.5);

    const amp =
      1 +
      volume * 2.2;

    arr[i] =
      ox +
      ox * noise *
      PARAMS.deform *
      amp;

    arr[i+1] =
      oy +
      oy * noise *
      PARAMS.deform *
      amp;

    arr[i+2] =
      oz +
      oz * noise *
      PARAMS.deform *
      amp;
  }

  pos.needsUpdate = true;

  geo.computeVertexNormals();
}

function animate(){

  requestAnimationFrame(animate);

  const volume =
    getVolume();

  animateSculpture(volume);

  sculpture.rotation.y +=
    0.004 + volume * 0.03;

  sculpture.rotation.x +=
    0.002 + volume * 0.01;

  const targetX =
    (mouseX - 0.5) * 0.6;

  const targetY =
    -(mouseY - 0.5) * 0.6;

  sculpture.position.x +=
    (targetX - sculpture.position.x) * 0.05;

  sculpture.position.y +=
    (targetY - sculpture.position.y) * 0.05;

  const scale =
    1 + volume * 1.8;

  sculpture.scale.setScalar(scale);

  renderer.render(scene,camera);
}

window.addEventListener('mousemove',(e)=>{

  mouseX =
    e.clientX / window.innerWidth;

  mouseY =
    e.clientY / window.innerHeight;
});

window.addEventListener('touchmove',(e)=>{

  const t = e.touches[0];

  mouseX =
    t.clientX / window.innerWidth;

  mouseY =
    t.clientY / window.innerHeight;
});

window.addEventListener('resize',()=>{

  if(!camera) return;

  camera.aspect =
    window.innerWidth /
    window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );
});

startBtn.addEventListener('click',async()=>{

  errorEl.innerHTML = '';

  startBtn.disabled = true;

  try{

    await initCamera();

    await initAudio();

    initThree();

    overlay.style.opacity = '0';

    setTimeout(()=>{

      overlay.style.display = 'none';

    },800);

    updateStatus('说句话试试');

    animate();

  }catch(err){

    console.error(err);

    let msg =
      err.message || '未知错误';

    if(err.name === 'NotAllowedError'){

      msg =
        '你拒绝了摄像头或麦克风权限';
    }

    else if(err.name === 'NotReadableError'){

      msg =
        '摄像头被其它软件占用';
    }

    else if(err.name === 'NotFoundError'){

      msg =
        '没有检测到摄像头设备';
    }

    else if(err.name === 'AbortError'){

      msg =
        '摄像头启动失败';
    }

    errorEl.innerHTML = `
      启动失败<br><br>
      ${msg}
    `;

    updateStatus('启动失败');

    startBtn.disabled = false;
  }
});

</script>

</body>
</html>
